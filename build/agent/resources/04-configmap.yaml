apiVersion: v1
kind: ConfigMap
metadata:
  name: edgemesh-agent-cfg
  namespace: kubeedge
  labels:
    k8s-app: kubeedge
    kubeedge: edgemesh-agent
data:
  edgemesh-agent.yaml: |
    # For more detailed configuration, please refer to: https://edgemesh.netlify.app/reference/config-items.html#edgemesh-agent-cfg
    modules:
      edgeProxy:
        enable: true
        # Required by the managed RuntimeService path. It is also the default,
        # but keeping it explicit makes raw-manifest enablement deterministic.
        serviceFilterMode: FilterIfLabelExists
        # Enabled for Dayu v1.4 RuntimeServices. Unlabelled Services from Dayu
        # v1.0-v1.3 remain on the legacy JointMultiEdgeService/NodePort path.
        managedRuntime:
          enable: true
        loadBalancer:
          consistentHash:
            partitionCount: 1000
            replicationFactor: 10
            load: 1.25
      edgeTunnel:
        enable: true
        #relayNodes:
        #- nodeName: <your relay node name1>
        #  advertiseAddress:
        #  - 1.1.1.1
        #- nodeName: <your relay node name2>
        #  advertiseAddress:
        #  - 2.2.2.2
        #  - 3.3.3.3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edgemesh-agent-psk
  namespace: kubeedge
  labels:
    k8s-app: kubeedge
    kubeedge: edgemesh-agent
